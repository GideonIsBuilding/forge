engine:
  host: "0.0.0.0"
  port: 8080
  log_dir: "logs"
  max_concurrency: 2
  max_job_duration_s: 1800

registry:
  url: "http://localhost:8080"
  db_path: "data/forge.db"
  blob_dir: "blobs"

storage:
  workspace_dir: "workspaces"

runner:
  docker_network: "forge_build_net"
  registry_host: "forge-api"
  default_image: "alpine:3.18"
  pids_limit: 256
  no_new_privileges: true
  drop_capabilities: ["ALL"]

slack:
  webhook_url: ""
  tags:
    platform: "@platform"
    security: "@security"
