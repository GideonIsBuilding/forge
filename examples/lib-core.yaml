name: build-lib-core
version: 1.0.0
dependencies: []
jobs:
  build:
    runtime: alpine:3.18
    resources:
      cpu: 1.0
      memory: 512Mi
    steps:
      - name: test
        run: "echo 'running tests for lib-core' && mkdir -p src && echo 'lib-core source' > src/lib.c"
      - name: package
        run: "tar czf out.tar.gz src/"
artifacts:
  - name: lib-core
    version: 1.0.0
    path: ./out.tar.gz
